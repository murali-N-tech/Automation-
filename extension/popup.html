<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hire-Me AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111827;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header span { font-size: 20px; }
    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-success { background: #059669; color: white; }
    .btn-success:hover { background: #047857; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { border: none; border-top: 1px solid #e5e7eb; }
    #status-text {
      font-size: 12px;
      text-align: center;
      padding: 8px 12px;
      border-radius: 6px;
      background: #f3f4f6;
      color: #6b7280;
    }
    #status-text.success { background: #d1fae5; color: #065f46; }
    #status-text.error { background: #fee2e2; color: #991b1b; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span>🤖</span>
    <h1>Hire-Me AI: Smart Apply</h1>
  </div>
  <div class="body">
    <div class="field-group">
      <label>JWT Token</label>
      <input type="password" id="jwt-token" placeholder="Paste your bearer token" autocomplete="off" />
    </div>
    <div class="field-group">
      <label>Application ID</label>
      <input type="text" id="app-id" placeholder="Paste the Application _id" autocomplete="off" />
    </div>
    <button id="load-btn" class="btn btn-primary">① Load Job Data</button>
    <div id="status-text">Status: No data loaded</div>
    <hr class="divider" />
    <button id="autofill-btn" class="btn btn-success">② Autofill Current Tab</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
